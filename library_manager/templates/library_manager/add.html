{% extends "library_manager/home.html" %}

{% block title_name %}Add {{ entity.title }}{% endblock title_name %}


{% block result %}

<div class='d-flex flex-row flex-wrap'>
{% for id, type, label in fields %}

<div class="form-floating w-50">
    <input type={{ type }} class="form-control shadow rounded-4" id="{{ id }}" placeholder="">
    <label for="{{ id }}">{{ label }}</label>
</div>
    
{% endfor %}
</div>

{% endblock result %}
